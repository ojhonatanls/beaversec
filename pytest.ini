[pytest]
minversion = 8.0
addopts = -v --strict-markers --cov=beaversec --cov-report=term-missing
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Tests that take longer to run
    security: Security-related tests