# BeaverSec Configuration
# Replace the placeholder API keys with your actual keys.

# --- NVD (National Vulnerability Database) API ---
# Request a free API key at: https://nvd.nist.gov/developers/request-an-api-key
# After activation, include it in your requests to maintain rate limits.
nvd:
  api_key: "YOUR_NVD_API_KEY"

# --- SecurityTrails API ---
# Your API key can be found or created in the SecurityTrails control panel.
# It is used for the 'subdomain_brute' module enrichment.
# NOTE: SecurityTrails no longer offers a free API plan. Leave empty if you don't have a paid plan.
securitytrails:
  api_key: ""  # Deixe vazio – não há plano gratuito disponível

# --- Shodan API ---
# Get your API key from your Shodan account page.
# Used for the 'shodan_enum' module.
shodan:
  api_key: "YOUR_SHODAN_API_KEY"

# --- Rate Limiting and Timeouts ---
rate_limit: 200  # default rate tokens per second for token bucket
http_timeout: 30

# --- Proxy and Tor Support ---
proxy:
  url: ""            # e.g., "http://127.0.0.1:8080" or "socks5://127.0.0.1:9050"
  username: ""
  password: ""

use_tor: false
tor_proxy: "socks5://127.0.0.1:9050"

# --- Stealth Mode Settings ---
stealth:
  enable_mac_spoof: false
  random_delay_range: [0.0, 0.5]  # seconds
  packet_fragmentation: false

# --- Exporters ---
exporters:
  json: true
  html: true
  csv: true
  pdf: false
arp_timeout: 2
